<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AR Aging Dashboard</title>

<!-- Import map: le dice al navegador dónde encontrar cada paquete cuando el
     JSX hace `import ... from "react"`, `"recharts"`, etc. -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
    "recharts": "https://esm.sh/recharts@2.12.7?deps=react@18.3.1,react-dom@18.3.1",
    "lucide-react": "https://esm.sh/lucide-react@0.383.0?deps=react@18.3.1"
  }
}
</script>

<!-- Babel Standalone: transforma el JSX en el navegador, respetando el import map -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Inter, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<!-- data-type="module" le dice a Babel que deje los import/export como ES modules
     nativos (que el navegador resuelve usando el import map de arriba),
     y solo transforme la sintaxis JSX -->
<script type="text/babel" data-type="module" data-presets="react" src="dashboard.jsx"></script>
</body>
</html>
